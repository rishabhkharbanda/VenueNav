services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: venuenav
      POSTGRES_PASSWORD: venuenav
      POSTGRES_DB: venuenav
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/001_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venuenav -d venuenav"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+psycopg://venuenav:venuenav@db:5432/venuenav
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: venuenav
      S3_USE_SSL: "false"
      S3_PUBLIC_ENDPOINT: http://127.0.0.1:9000
      AUTH_DISABLED: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: ["uvicorn", "venuenav.main:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers"]

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://venuenav:venuenav@db:5432/venuenav
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["python", "-m", "venuenav.workers.map_worker"]
    restart: on-failure

volumes:
  pgdata: {}
  miniodata: {}
